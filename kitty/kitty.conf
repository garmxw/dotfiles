# Configuration
font_family                 Monaspace Neon NF Medium
font_size                   12
bold_font                   Monaspace Neon NF Bold
italic_font                 Monaspace Neon NF Italic
bold_italic_font            Monaspace Neon NF Bold Italic
remember_window_size        no
initial_window_width        950
initial_window_height       500
cursor_blink_interval       0.5
cursor_stop_blinking_after  1
scrollback_lines            2000
wheel_scroll_min_lines      1
enable_audio_bell           no
window_padding_width        10
hide_window_decorations     yes
background_opacity          0.55
dynamic_background_opacity  yes
confirm_os_window_close     0
# selection_foreground        none
# selection_background        #282828

# Animated cursor follows text
include $HOME/.config/ml4w/settings/kitty-cursor-trail.conf

# Include wallpaper colors
#include colors-matugen.conf
#include black_metal_gorgoroth.conf
include customTheme.conf

# Include Custom Configuration
# Create the file custom.conf in ~/.config/kitty to overwrite the default configuration
include $HOME/.config/kitty/custom.conf

#keymaps
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard

# BEGIN_KITTY_THEME
# graphite
include current-theme.conf
# END_KITTY_THEME
